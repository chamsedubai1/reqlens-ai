# Tiny nginx proxy that Traefik routes to; it forwards to the ReqLens app
# running on the host (PM2) via the Docker network gateway.
# Replace 172.18.0.1 with YOUR Traefik network's gateway if different.
server {
  listen 80;
  server_name _;
  client_max_body_size 4m;
  location / {
    proxy_pass http://172.18.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 120s;
  }
}
