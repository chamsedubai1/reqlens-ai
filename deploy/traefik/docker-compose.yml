# Adds ReqLens to an EXISTING Traefik (Docker) reverse proxy on the same VPS.
# Traefik auto-discovers this container by its labels and handles HTTPS.
# Adjust: the external network name (2x), the Host(...) rule, the entrypoints,
# and the certresolver to match your Traefik. See README.md.
services:
  reqlens-proxy:
    image: nginx:alpine
    container_name: reqlens-proxy
    restart: unless-stopped
    networks: [root_default]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./reqlens.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.reqlens.rule=Host(`reqlensai.com`) || Host(`www.reqlensai.com`)"
      - "traefik.http.routers.reqlens.entrypoints=web,websecure"
      - "traefik.http.routers.reqlens.tls=true"
      - "traefik.http.routers.reqlens.tls.certresolver=mytlschallenge"
      - "traefik.http.services.reqlens.loadbalancer.server.port=80"
networks:
  root_default:
    external: true
