# nginx reverse proxy for ReqLens AI (Next.js standalone on 127.0.0.1:3000).
# 1) Replace YOUR_DOMAIN below with your Hostinger domain.
# 2) Save as /etc/nginx/sites-available/reqlens and symlink into sites-enabled.
# 3) `nginx -t && systemctl reload nginx`
# 4) Add HTTPS with:  certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
#    (certbot rewrites this file to add the :443 server block + HTTP->HTTPS redirect).

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Allow larger request bodies (document uploads).
    client_max_body_size 4m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;   # AI reviews can take a few seconds
    }
}
